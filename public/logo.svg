<svg width="220" height="100" viewBox="0 0 220 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luxury Voyage Collection">

  <!-- ── LVC Monogram Mark ── -->
  <!-- Outer chevron with stepped tops (widest) -->
  <polyline
    points="30,10 47,10 110,56 173,10 190,10"
    fill="none" stroke="#c5a059" stroke-width="6.5"
    stroke-linejoin="miter" stroke-linecap="square"/>

  <!-- Middle chevron -->
  <polyline
    points="47,10 62,10 110,43 158,10 173,10"
    fill="none" stroke="#c5a059" stroke-width="6"
    stroke-linejoin="miter" stroke-linecap="square"/>

  <!-- Inner chevron (narrowest) -->
  <polyline
    points="65,10 79,10 110,30 141,10 155,10"
    fill="none" stroke="#c5a059" stroke-width="5.5"
    stroke-linejoin="miter" stroke-linecap="square"/>

  <!-- ── Brand Text ── -->
  <!-- "Luxury Voyage" in white serif (works on dark bg) -->
  <text
    x="110" y="76"
    font-family="Georgia, 'DM Serif Display', serif"
    font-size="16.5"
    fill="white"
    text-anchor="middle"
    font-weight="700"
    letter-spacing="0.8">Luxury Voyage</text>

  <!-- "Collection" in gold spaced caps -->
  <text
    x="110" y="92"
    font-family="Georgia, serif"
    font-size="10"
    fill="#c5a059"
    text-anchor="middle"
    letter-spacing="5.5"
    font-weight="400">Collection</text>

</svg>
